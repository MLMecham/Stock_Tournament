name: Render README

on:
  repository_dispatch:
    types: [render-readme]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Render README and leaderboard
        run: uv run python src/render.py

      - name: Commit and push
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git add README.md data/leaderboard/
          git diff --staged --quiet || git commit -m "docs: leaderboard $(date +%Y-%m-%d) [skip ci]"
          git push
